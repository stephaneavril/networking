<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Reto Foto</title>
  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      background-color: #0c0e2c;
      color: white;
      padding: 40px;
      text-align: center;
    }

    .container {
      background-color: #1f2140;
      padding: 30px;
      border-radius: 15px;
      max-width: 600px;
      margin: auto;
      box-shadow: 0 0 20px rgba(255, 255, 255, 0.1);
    }

    h1 {
      color: #ec1c24;
    }

    input[type="file"], button {
      width: 100%;
      padding: 10px;
      margin-top: 15px;
      border-radius: 8px;
      border: none;
      font-size: 1em;
    }

    button {
      background-color: #ec1c24;
      color: white;
      font-weight: bold;
      cursor: pointer;
    }

    .ya-subido {
      background-color: #2d2f4c;
      padding: 20px;
      border-radius: 10px;
      margin-top: 20px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>📸 Reto Foto</h1>

    {% if ya_existe %}
      <div class="ya-subido">
        <p>Ya has subido tu foto para este reto. ¡Gracias por participar!</p>
      </div>
    {% else %}
      <form method="POST" enctype="multipart/form-data">
        <p>{{ mensaje if mensaje else "Sube una foto original que represente tu creatividad. Esta será votada por los demás participantes." }}</p>
        <input type="file" name="foto" accept="image/*" required>
        <button type="submit">Subir Foto</button>
      </form>
    {% endif %}
  </div>
</body>
</html>
