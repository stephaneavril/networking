<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Reto Grupal</title>
</head>
<body>
  <h1>🎯 Tu reto es jugar a: <strong>{{ reto }}</strong></h1>
  <form action="/guardar_reto_grupal" method="POST" enctype="multipart/form-data">
    <input type="hidden" name="reto" value="{{ reto }}">
    <p>🧑‍🤝‍🧑 Nombres de los participantes:</p>
    <textarea name="nombres" rows="3" cols="50" required></textarea><br><br>
    <p>📸 Sube una foto del equipo:</p>
    <input type="file" name="foto" required><br><br>
    <button type="submit">Enviar evidencia</button>
  </form>
</body>
</html>
