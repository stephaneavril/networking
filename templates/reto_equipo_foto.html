<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>📸 Sube tu Foto de Equipo</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      background: radial-gradient(circle at top center, #1a1d3d, #0c0e2c);
      font-family: 'Segoe UI', sans-serif;
      color: white;
      text-align: center;
      padding: 20px;
    }

    .tarjeta {
      background-color: #1f2140;
      border: 2px solid #ec1c24;
      padding: 30px;
      border-radius: 15px;
      max-width: 500px;
      margin: auto;
      box-shadow: 0 0 15px rgba(236, 28, 36, 0.4);
    }

    h1 {
      font-size: 2em;
      color: #ec1c24;
      margin-bottom: 20px;
      text-shadow: 2px 2px 6px black;
    }

    label, select, input[type="file"] {
      display: block;
      width: 100%;
      margin-top: 15px;
      font-size: 1em;
    }

    select, input[type="file"] {
      padding: 10px;
      border-radius: 8px;
      border: none;
    }

    button {
      margin-top: 25px;
      background-color: #ec1c24;
      border: none;
      padding: 12px 24px;
      color: white;
      font-size: 1em;
      border-radius: 8px;
      cursor: pointer;
      box-shadow: 0 0 10px rgba(236, 28, 36, 0.3);
    }

    .mensaje {
      margin-top: 20px;
      color: #8bc34a;
    }
  </style>
</head>
<body>
  <div class="tarjeta">
    <h1>📸 Sube tu Foto de Equipo</h1>
    <form method="POST" enctype="multipart/form-data">
      <label for="equipo">Selecciona tu equipo (1 al 20):</label>
      <select name="equipo" id="equipo" required>
        <option value="">-- Elige tu equipo --</option>
        {% for i in range(1, 21) %}
          <option value="{{ i }}">Equipo {{ i }}</option>
        {% endfor %}
      </select>

      <label for="foto">Selecciona una foto:</label>
      <input type="file" name="foto" id="foto" accept="image/*" required>

      <button type="submit">Enviar Foto</button>
    </form>
    {% with messages = get_flashed_messages() %}
      {% if messages %}
        <div class="mensaje">
          {{ messages[0] }}
        </div>
      {% endif %}
    {% endwith %}
  </div>
</body>
</html>
