<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Networking Bingo</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #0c0e2c;
      color: white;
      margin: 0;
      padding: 0;
    }
    header {
      background: #ec1c24;
      padding: 20px;
      text-align: center;
      font-size: 1.5em;
      font-weight: bold;
    }
    .container {
      max-width: 700px;
      margin: 30px auto;
      padding: 20px;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 15px;
    }
    .card {
      background: #1f2140;
      border-radius: 12px;
      padding: 20px;
      text-align: center;
      box-shadow: 0 4px 8px rgba(0,0,0,0.2);
      transition: 0.3s;
      cursor: pointer;
    }
    .card:hover {
      background: #2c2f55;
    }
    .card h3 {
      margin: 10px 0 0;
      font-size: 1em;
      color: #fff;
    }
    .badge {
      background: #ec1c24;
      color: white;
      padding: 4px 8px;
      border-radius: 8px;
      font-size: 0.75em;
      display: inline-block;
    }
    footer {
      text-align: center;
      padding: 20px;
      font-size: 0.9em;
      background-color: #15173c;
      color: #aaa;
    }
    footer a {
      color: #ec1c24;
      text-decoration: none;
    }
  </style>
</head>
<body>

  <header>Networking Bingo</header>

  <div class="container">
    <p style="text-align: center; font-size: 1.1em;">
      ¡Hola {{ session['jugador'] }}! Selecciona un reto para comenzar:
    </p>

    <div class="grid">
      {% for reto in retos %}
        <div class="card" onclick="location.href='/adivina' if reto.nombre == 'Adivina Quién' else alert('Sube evidencia en otra vista')">
          <div class="badge">+{{ reto.puntos }}</div>
          <h3>{{ reto.nombre }}</h3>
        </div>
      {% endfor %}

      <div class="card" onclick="location.href='/ranking_adivina'">
        <div class="badge">👑</div>
        <h3>Ranking Adivina Quién</h3>
      </div>
    </div>
  </div>

  <footer>
    &copy; 2025 TEAMS | <a href="https://teams.com.mx">teams.com.mx</a>
  </footer>

</body>
</html>
